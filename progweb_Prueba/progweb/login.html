<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - EstampArt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>EstampArt</h1>
        <p>Tu tienda online de poleras y estampados únicos</p>
    </header>

    <nav>
        <ul>
            <li><a href="Index.html">Inicio</a></li>
            <li><a href="Index.html#contacto">Contacto</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Iniciar Sesión</h2>
            <div class="formulario">
                <form id="formLogin">
                    <label for="usuario">Usuario:</label>
                    <input type="text" id="usuario" name="usuario" required placeholder="Ingresa tu usuario">

                    <label for="clave">Contraseña:</label>
                    <input type="password" id="clave" name="clave" required placeholder="Ingresa tu contraseña">

                    <button type="submit">Iniciar sesión</button>
                    <div id="resultado"></div>
                </form>
                <p style="margin-top:1rem; text-align:center;">
                    ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
                </p>
            </div>
        </section>
    </main>

    <footer>
        <p>EstampArt - Programación Web &copy; 2026</p>
    </footer>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(e) {
            e.preventDefault();
            const resultado = document.getElementById('resultado');
            const datos = {
                usuario: document.getElementById('usuario').value.trim(),
                clave: document.getElementById('clave').value.trim()
            };
            try {
                const respuesta = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                const json = await respuesta.json();
                if (json.ok) {
                    resultado.textContent = '✔ ' + json.mensaje;
                    resultado.style.color = 'green';
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    resultado.textContent = '✖ ' + json.mensaje;
                    resultado.style.color = 'red';
                }
            } catch (error) {
                resultado.textContent = 'Error al conectar con el servidor';
                resultado.style.color = 'red';
            }
        });
    </script>

</body>
</html>
